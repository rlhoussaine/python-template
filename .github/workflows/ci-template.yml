name: CI Template

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  UV_CACHE_DIR: ~/.cache/uv

jobs:
  # ── Lint des sources du template ─────────────────────────────────────────
  lint-sources:
    name: Lint Template Sources
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install ruff
        run: uv tool install ruff

      - name: Ruff sur les fichiers .jinja
        run: |
          find template/ -name "*.jinja" | while read f; do
            # Strip jinja tags for linting
            sed 's/{[%{].*[%}]}//g' "$f" > /tmp/lint_target.py
            ruff check /tmp/lint_target.py || true
          done

      - name: Validate YAML sources
        run: |
          uv tool install check-jsonschema
          find . -name "*.yml" -not -path "./.git/*" | xargs uv run check-jsonschema --check-metaschema || true

  # ── Validation du template (génération + tests) ───────────────────────────
  validate-template:
    name: Validate Generated Project
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        options:
          - label: "minimal"
            extra_args: ""
          - label: "with_just"
            extra_args: "--data task_runner=just"
          - label: "with_make"
            extra_args: "--data task_runner=make"
          - label: "with_publish"
            extra_args: "--data use_pypi_publish=true"
          - label: "full"
            extra_args: "--data use_docker=true --data use_github_actions=true --data use_pre_commit=false --data use_docs=true --data use_cli=true --data use_hypothesis=true --data task_runner=just --data use_pypi_publish=true"
          - label: "hypothesis"
            extra_args: "--data use_hypothesis=true"
          - label: "full_hypothesis_testcontainers"
            extra_args: "--data use_docker=true --data use_github_actions=true --data use_pre_commit=false --data use_docs=true --data use_cli=true --data use_hypothesis=true --data use_testcontainers=true --data task_runner=just --data use_pypi_publish=true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Copier
        run: uv tool install copier

      - name: Generate project from template
        run: |
          copier copy . /tmp/test-project \
            --defaults \
            --data project_name="Test Project" \
            --data author="CI Bot" \
            --data github_username="ci-bot" \
            --data email="ci@example.com" \
            --data python_version="${{ matrix.python-version }}" \
            ${{ matrix.options.extra_args }} \
            --trust

      - name: Install generated project
        run: uv sync --all-groups
        working-directory: /tmp/test-project

      - name: Run tests on generated project
        run: uv run pytest -q
        working-directory: /tmp/test-project

      - name: Lint generated project
        run: |
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/
        working-directory: /tmp/test-project

  # ── Validation des workflows GitHub Actions ──────────────────────────────
  validate-workflows:
    name: Validate GitHub Actions Workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv and copier
        uses: astral-sh/setup-uv@v5
      - run: uv tool install copier

      - name: Generate full project
        run: |
          copier copy . /tmp/test-actions \
            --defaults \
            --data project_name="Test" \
            --data author="CI" \
            --data github_username="ci" \
            --data email="ci@example.com" \
            --data use_github_actions=true \
            --data use_pypi_publish=true \
            --data task_runner=just \
            --trust

      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.7
        with:
          path: /tmp/test-actions/.github/workflows/

  # ── Validation Docker build ──────────────────────────────────────────────
  validate-docker:
    name: Validate Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install copier
        uses: astral-sh/setup-uv@v5
      - run: uv tool install copier

      - name: Generate project with Docker
        run: |
          copier copy . /tmp/test-docker \
            --defaults \
            --data project_name="Test" \
            --data author="CI" \
            --data github_username="ci" \
            --data email="ci@example.com" \
            --data use_docker=true \
            --trust
          cd /tmp/test-docker
          uv sync

      - name: Build prod image
        run: |
          cd /tmp/test-docker
          docker buildx build --target prod -t test:prod --load .

      - name: Verify uv is NOT in prod image
        run: |
          if docker run --rm test:prod which uv 2>/dev/null; then
            echo "ERROR: uv binary should not be in prod image"
            exit 1
          fi

      - name: Verify non-root user
        run: |
          USER=$(docker run --rm test:prod id -u)
          if [ "$USER" = "0" ]; then
            echo "ERROR: prod image must run as non-root"
            exit 1
          fi

  # ── Audit de sécurité ─────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install pip-audit
        run: uv tool install pip-audit

      - name: Generate project for audit
        run: |
          uv tool install copier
          copier copy . /tmp/audit-project \
            --defaults \
            --data project_name="Audit Project" \
            --data author="CI Bot" \
            --data github_username="ci-bot" \
            --data email="ci@example.com" \
            --trust

      - name: pip-audit
        run: |
          cd /tmp/audit-project
          uv sync --all-groups
          uv run pip-audit
