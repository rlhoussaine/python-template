name: 🚀 Feature Request
description: Proposer un nouvel outil, une option ou une amélioration au template
title: "[FEAT] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Merci pour ta suggestion ! Décris ce que tu aimerais voir dans le template.

  - type: dropdown
    id: type
    attributes:
      label: Type de demande
      options:
        - Nouvel outil (linter, formatter, type checker...)
        - Nouvelle option Copier (use_xxx)
        - Amélioration d'un fichier existant
        - Documentation
        - Autre
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problème à résoudre
      description: "Quel pain point cette feature résoudrait-elle ?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solution proposée
      description: "Décris comment tu imagines l'implémentation."
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives envisagées
    validations:
      required: false
