name: 🚀 Feature Request
description: Propose a new tool, option, or improvement to the template
title: "[FEAT] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion! Describe what you would like to see in the template.

  - type: dropdown
    id: type
    attributes:
      label: Request type
      options:
        - New tool (linter, formatter, type checker...)
        - New Copier option (use_xxx)
        - Improvement to an existing file
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: "What pain point would this feature address?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "Describe how you imagine it could work."
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
