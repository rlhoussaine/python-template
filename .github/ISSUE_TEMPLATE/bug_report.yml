name: 🐛 Bug Report
description: The template generates something broken or unexpected
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this bug. Please fill in the fields below with as much detail as possible.

  - type: input
    id: copier-version
    attributes:
      label: Copier version
      placeholder: "e.g., 9.4.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Selected Python version
      placeholder: "e.g., 3.12"
    validations:
      required: true

  - type: textarea
    id: options
    attributes:
      label: Selected Copier options
      description: "Paste your `.copier-answers.yml` content here"
      render: yaml
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: "What isn't working? What was the expected behavior?"
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error message
      render: shell
