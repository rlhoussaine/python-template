_min_copier_version: "9.4.0"
_subdirectory: template
_templates_suffix: .jinja
_envops:
  trim_blocks: true
  lstrip_blocks: true
  keep_trailing_newline: true

# ─── Questions ───────────────────────────────────────────────────────────────

project_name:
  type: str
  help: "Project name (e.g., Spectral Anomaly Detection)"
  validator: "{% if not project_name %}Required{% endif %}"

project_slug:
  type: str
  help: "Python package slug (snake_case)"
  default: "{{ project_name | lower | replace(' ', '_') | replace('-', '_') }}"

project_description:
  type: str
  help: "Short description"
  default: "A Python project."

author:
  type: str
  help: "Author"
  default: "Your Name"

github_username:
  type: str
  help: "GitHub username"
  default: "your-username"

email:
  type: str
  help: "Email"
  default: "you@example.com"

python_version:
  type: str
  help: "Minimum Python version"
  default: "3.12"
  choices: ["3.11", "3.12", "3.13", "3.14"]

license:
  type: str
  help: "License"
  default: "MIT"
  choices: ["MIT", "Apache-2.0", "GPL-3.0", "Proprietary"]

use_docker:
  type: bool
  help: "Include a Dockerfile?"
  default: true

use_github_actions:
  type: bool
  help: "Include GitHub Actions CI?"
  default: true

use_pre_commit:
  type: bool
  help: "Include pre-commit?"
  default: true

task_runner:
  type: str
  help: "Task runner (just = recommended, cross-platform)"
  default: "just"
  choices:
    - just
    - make
    - both

use_docs:
  type: bool
  help: "Include MkDocs?"
  default: false

use_cli:
  type: bool
  help: "Include a CLI (click)?"
  default: false

use_data:
  type: bool
  help: "Include a data/ folder with Git LFS?"
  default: false

use_notebooks:
  type: bool
  help: "Include a notebooks/ folder?"
  default: false

use_hypothesis:
  type: bool
  help: "Include Hypothesis (property-based testing)?"
  default: false

use_testcontainers:
  type: bool
  help: "Include Testcontainers (integration tests with Docker)?"
  default: false

use_pypi_publish:
  type: bool
  help: "Publish to PyPI via Trusted Publishing OIDC (release workflow)?"
  default: false

# ─── Conditional exclusions ──────────────────────────────────────────────────
_exclude:
  - "{% if not use_docs %}docs{% endif %}"
  - "{% if not use_docs %}mkdocs.yml{% endif %}"
  - "{% if not use_data %}data{% endif %}"
  - "{% if not use_data %}.gitattributes{% endif %}"
  - "{% if not use_notebooks %}notebooks{% endif %}"
  - "{% if not use_github_actions %}.github/ISSUE_TEMPLATE{% endif %}"
  - "{% if not use_github_actions %}.github/pull_request_template.md{% endif %}"
  - "{% if task_runner == 'just' %}Makefile{% endif %}"
  - "{% if task_runner == 'make' %}justfile{% endif %}"
  - "{% if not use_github_actions %}SECURITY.md{% endif %}"
  - "{% if not use_pypi_publish %}.github/workflows/publish.yml{% endif %}"
  - "{% if not use_docker %}.renovaterc.json{% endif %}"
